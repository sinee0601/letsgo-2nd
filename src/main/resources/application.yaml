spring:
  application:
    name: letsgo-springboot
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://127.0.0.1:3307/mydb
    username: mydbid
    password: mydbpw
  thymeleaf:
    prefix: classpath:/templates/html/
    suffix: .html
    cache: false
    check-template-location: true
  security:
    user:
      name: admin
      password: 1234
  jpa:
    open-in-view: false
    generate-ddl: true
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
mybatis:
  mapper-locations: classpath:mappers/*.xml

server:
  port: 5531