spring:
  application:
    name: letsgo-springboot
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  thymeleaf:
    prefix: classpath:/templates/html/
    suffix: .html
    cache: false
    check-template-location: true
  security:
    user:
      name: admin
      password: 1234
  jpa:
    open-in-view: false
    generate-ddl: true
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        highlight_sql: true
        default_batch_fetch_size: 100


mybatis:
  mapper-locations: classpath:mappers/*.xml

tour:
  service-key: ${SERVICE_KEY}

server:
  port: 5531
