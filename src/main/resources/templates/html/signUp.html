<!DOCTYPE html>
<html lang="en">
<head>
    <link rel = "stylesheet" href ="/css/signup.css">
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="signupbox">
    <form method="post" action="/user/signUp">
        <div class="name">
            <label for="nameInput">이름</label><input id="nameInput" name="name" placeholder="이름">
        </div>
        <div class="id">
            <label for="idInput">아이디</label><input id="idInput" name="userID" placeholder="아이디">
        </div>
        <div class="email">
            <label for="emailInput">이메일</label><input id="emailInput" name="email" placeholder="이메일">
        </div>

        <div class="pw">
            <label for="pwInput">비밀번호</label><input id="pwInput" name="password" type="password" placeholder="비밀번호">
        </div>
        <div class="pw">
            <label for="pwConfirmInput">비밀번호 확인</label><input id="pwConfirmInput" type="password" placeholder="비밀번호 확인">
        </div>

        <div>
            <button>회원가입</button>
        </div>
        <div>
            <a href="loginView">로그인</a>
        </div>
    </form>
</div>
</body>
</html>
