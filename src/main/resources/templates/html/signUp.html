<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="signupbox">
    <div class="name">
        <label for="nameInput">이름</label><input id="nameInput" placeholder="이름">
    </div>
    <div class="id">
        <label for="idInput">아이디</label><input id="idInput" placeholder="아이디">
    </div>
    <div class="email">
        <label for="emailInput">이메일</label><input id="emailInput" placeholder="이메일">
    </div>

    <div class="pw">
        <label for="pwInput">비밀번호</label><input id="pwInput" type="password" placeholder="비밀번호">
    </div>
    <div class="pw">
        <label for="pwConfirmInput">비밀번호 확인</label><input id="pwConfirmInput" type="password" placeholder="비밀번호 확인">
    </div>

    <div>
        <button>회원가입</button>
    </div>
    <div>
        <a href="login.html">로그인</a>
    </div>
</div>
</body>
</html>
