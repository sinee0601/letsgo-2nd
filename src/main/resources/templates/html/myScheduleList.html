<!DOCTYPE html>
<html lang="ko" xmlns:c="http://www.w3.org/1999/XSL/Transform">
<head>
    <link rel="stylesheet" th:href="@{/css/myScheduleList.css}">
    <script th:src="@{/js/myScheduleList.js}" defer></script>
    <meta charset="UTF-8"/>
</head>
<body>


<main>

    <header>
        <div class="logo">
            <a href="#" title="Let's GO! 홈">
                <img src="#" alt="Let's GO!" class="site-logo"/>
            </a>
        </div>
        <ul class="menu"
            style="list-style: none; display: flex; padding: 0; margin: 0;">
            <li><a href="">홈</a></li>
            <li><a href="">플레이스 조회</a></li>
            <li><a href="">일정게시판</a></li>
            <li><a href="">내일정</a></li>

        </ul>

    </header>
    <div class="layout-wrapper">
        <aside class="sidebar">
            <div>
                <div>
                    <a href="myschedule">
                        <button>전체 일정</button>
                    </a>
                </div>
                <div>
                    <a href="myscheduleshared">
                        <button>공유된 일정</button>
                    </a>
                </div>
            </div>
        </aside>

        <div class="main-content">
            <div class="content-left">
                <div class="search-area">
                    <input type="text" placeholder="장소 이름이나 일정 이름을 검색하세요" name="searchTitle"/>
                    <button type="submit" id="searchPlaces">검색하기</button>
                    <div class="sort-area">
                        <select name="sortOrder">
                            <option value="">날짜순</option>
                            <option value="title">이름순</option>
                        </select>
                    </div>
                </div>
                <div class="edit-area">
                    <button>수정하기</button>
                </div>
            </div>

            <div class="container" id="scheduleListContainer">
                <div th:each="item : ${myScheduleList}">
                    <figure class="figure">
                        <div>
                            <span th:text="${item.myScheduleTitle}">수영하려 가자</span><br/>
                            <span th:if="${item.isShared == '1'}">👥 공유중</span>
                        </div>
                        <a th:href="@{myScheduleRouteManageUI?myScheduleId=${item.myScheduleId}}">
                            <img th:src="${item.firstImage}" alt="이미지" class="box-placeholder"/>
                        </a>
                        <figcaption class="figure-caption" th:text="${item.placeTitle}">금원 수원 수영장</figcaption>
                        <div th:text="${#strings.substring(item.startAt, 0, 10)} ">2026-04-16
                        <span th:text="' 📍'+ ${item.addr1}">📍경기 안양</span>
                        </div>
                    </figure>
                </div>
            </div>

        </div>
    </div>
</main>


</body>
</html>
