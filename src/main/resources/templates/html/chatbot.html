<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Chatbot Modal</title>
</head>
<body>

<button type="button" class="btn-open-modal"><h1>🤖</h1></button>

<div class="modal" id="chatModal">
    <div class="modal_body">
        <div class="chat-header">
            <h2>🤖 AI 챗봇 상담</h2>
        </div>

        <div class="chat-box" id="chatBox">
            <div><strong>시스템:</strong> 안녕하세요. LetsGo의 레저스포츠 agent 입니다. 저는 레저스포츠의 이색있고 특별한 정보를 알려드릴수있습니다.</div>
        </div>

        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="메시지를 입력하세요...">
            <button type="button" id="btn-send">전송</button>
        </div>

        <div class="cart-footer-buttons" style="margin-top: 10px; text-align: right;">
            <button type="button" id="btn-close-modal">닫기</button>
        </div>
    </div>
</div>


</body>
</html>
