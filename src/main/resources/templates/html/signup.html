<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/auth-common.css}">
    <link rel="stylesheet" th:href="@{/css/signup.css}">
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>
<button type="button" class="back-button" onclick="history.back()">뒤로가기</button>
<div class="signupbox">
    <h1>회원가입</h1>

    <div id="signupMessage"></div>

    <form id="signupForm" method="post">
        <div class="name">
            <label for="nameInput">이름</label>
            <input id="nameInput" name="name" placeholder="이름">
        </div>
        <div class="id">
            <label for="idInput">아이디</label>
            <input id="idInput" name="userID" placeholder="아이디">
        </div>
        <div class="email">
            <label for="emailInput">이메일</label>
            <input id="emailInput" name="email" type="email" placeholder="이메일">
        </div>
        <div class="pw">
            <label for="pwInput">비밀번호</label>
            <input id="pwInput" name="password" type="password" placeholder="비밀번호">
        </div>
        <div class="pw">
            <label for="pwConfirmInput">비밀번호 확인</label>
            <input id="pwConfirmInput" name="passwordConfirm" type="password" placeholder="비밀번호 확인">
        </div>
        <div>
            <button type="submit">회원가입</button>
        </div>
    </form>
    <div>
        <a th:href="@{/user/loginView}">로그인</a>
    </div>
</div>
<script th:src="@{/js/signup.js}"></script>
</body>
</html>
