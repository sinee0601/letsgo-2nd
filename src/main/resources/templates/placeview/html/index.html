<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />

	<link rel="stylesheet" th:href="@{/view/css/floating-cart.css}" />
	<link rel="stylesheet" type="text/css" th:href="@{/view/css/index.css(v=2)}">
	<style>
		.like-btn {
			background: none;
			border: none;
			outline: none;
			cursor: pointer;
			padding: 0;
			transition: transform 0.12s ease, filter 0.12s ease;
		}

		.like-btn:hover {
			transform: scale(1.12);
			filter: brightness(1.05);
		}

		.like-btn:active {
			transform: scale(0.9);
		}
	</style>
</head>

<body th:with="so=${(sortOrder != null && sortOrder != '') ? sortOrder : 'distance'}" th:data-context-path="@{/}">

	<div th:replace="~{header/html/header :: header}">
		<p style="padding: 10px; background: #eee; border: 1px solid #ccc; text-align: center;"></p>
	</div>

	<h1>추천 레저스포츠 리스트</h1>

	<div class="sort-area">
		<label>
			<select id="sortOrderSelect" name="sortOrder">
				<option value="distance" th:selected="${so != 'like'}">전체</option>
				<option value="like" th:selected="${so == 'like'}">좋아요순</option>
			</select>
		</label>
	</div>

	<div class="container" id="leisurePlaceContainer">
		<figure class="figure" th:each="place : ${leisurePlaceList}">
			<th:block th:if="${place.firstImage != null && place.firstImage != ''}">
				<img th:src="${place.firstImage}" th:alt="${place.title}" class="box-placeholder" />
			</th:block>
			<th:block th:unless="${place.firstImage != null && place.firstImage != ''}">
				<a href="#" class="box-placeholder">이미지 없음</a>
			</th:block>


			
			<figcaption class="figure-caption" th:text="${place.title}">장소제목</figcaption>
			<span th:text="${place.addr1}">주소</span>

			<button type="button" class="like-btn" th:data-place-id="${place.placeId}" data-place-type="LEISURE" th:data-like-url="@{/placeLikeAjax}">
				<h1>❤️</h1>
			</button>
			<div class="like-count" th:id="'likeCount-' + ${place.placeId}" th:text="'좋아요: ' + ${place.likeCount}">좋아요:
				0</div>

			<button type="button" class="add-to-cart-btn" th:data-place-id="${place.placeId}"
				th:data-place-title="${place.title}" th:data-place-type="${place.placeType}">담기</button>
		</figure>
	</div>

	</main>

	<div id="session-cart-data" style="display: none;">
		<div th:each="cartPlace : ${session.placeCartList}" class="session-cart-item"
			th:data-place-id="${cartPlace.placeId}" th:data-place-title="${cartPlace.title}"
			th:data-place-type="${cartPlace.placeType}"></div>
	</div>


	<script th:src="@{/view/js/place-like.js}"></script>
	<script th:src="@{/view/js/floating-cart.js}"></script>


	<script th:src="@{/view/js/index.js}"></script>
</body>

</html>
