<button type="button" class="btn-open-chatbot" aria-label="챗봇 열기"><span>💬</span></button>

<div class="chatbot-panel" id="chatModal">
    <div class="chatbot-panel-header">
        <div class="chatbot-header-info">
            <div class="chatbot-avatar">🤖</div>
            <div class="chatbot-header-text">
                <span class="chatbot-title">여행 도우미</span>
                <span class="chatbot-status"><i class="chatbot-status-dot"></i>온라인</span>
            </div>
        </div>
        <button type="button" id="btn-close-chatbot" class="chatbot-close" aria-label="닫기">✕</button>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="chat-msg chat-msg-bot">
            <div class="chat-msg-avatar">🤖</div>
            <div class="chat-bubble">안녕하세요! LetsGO의 레저스포츠 agent입니다. 저는 레저스포츠의 이색있고 특별한 정보를 알려드릴 수 있어요!</div>
        </div>
    </div>

    <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="메시지를 입력하세요..." autocomplete="off" />
        <button type="button" id="btn-send" aria-label="전송">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>
</div>
